name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_ADDR: localhost:6379
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt required for:" && echo "$unformatted" && exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (unit + Redis integration, race detector)
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -f docker/Dockerfile -t rate-limiter:ci .

      - name: Smoke test image
        run: |
          docker run -d --rm --name rl -p 8080:8080 rate-limiter:ci
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -fsS http://localhost:8080/health
          curl -fsS -X POST http://localhost:8080/v1/check \
            -H 'Content-Type: application/json' \
            -d '{"resource":"api.ci.smoke","identifier":"ci"}'
          docker stop rl
